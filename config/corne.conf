# ---------- OLED display ----------
CONFIG_ZMK_DISPLAY=y

# ---------- ZMK Studio ----------
# Allow Studio to edit the keymap without an "unlock" combo.
# Set to =y later if you want locking for security.
CONFIG_ZMK_STUDIO_LOCKING=n

# ---------- Bluetooth ----------
# Keep the default number of BT profiles (5). Change if you want more/fewer.
# CONFIG_BT_MAX_CONN=5
# CONFIG_BT_MAX_PAIRED=5

# ---------- Power ----------
# Power off the keyboard after idle. Helps battery life.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   # 15 minutes

# ---------- RGB Underglow ----------
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Start with RGB off; toggle on/off from the Adjust layer (see keymap).
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# Turn RGB off automatically when the keyboard goes idle (major battery win).
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# If you want RGB to turn itself off whenever you unplug USB (i.e. on
# battery), uncomment the next line. Leaving it off means RGB stays on
# over Bluetooth too, at the cost of significant battery drain.
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
